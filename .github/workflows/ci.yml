name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Backend with Flake8
        run: |
          # Stop the build if there are critical syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other stylistic issues as warnings so it doesn't fail the build
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Verify Docker Compose Build
        run: |
          # Attempt to build the full multi-container architecture
          docker compose build